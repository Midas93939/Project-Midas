<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDAS HUB | V0.2A ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --card-bg: rgba(10, 10, 10, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        /* --- Animated Background Grid --- */
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* --- The Global Rainbow Border --- */
        html::before {
            content: "";
            position: fixed;
            inset: 0;
            border: 4px solid transparent;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            background-size: 400% 100%;
            animation: rainbow-flow 5s linear infinite;
            z-index: 9999;
            pointer-events: none;
        }

        @keyframes rainbow-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        .main-ui {
            width: 90%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            position: relative;
        }

        /* --- Logo Section --- */
        .logo-section {
            grid-column: span 2;
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-img {
            width: 150px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- The "Everything is Rainbow" Card Style --- */
        .rainbow-card {
            background: var(--card-bg);
            padding: 2px; /* This creates the border thickness */
            border-radius: 8px;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 400% 100%;
            animation: rainbow-flow 8s linear infinite;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .card-content {
            background: var(--card-bg);
            border-radius: 6px;
            padding: 25px;
            height: 100%;
        }

        h2 {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: #eee;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        /* --- Interactive List --- */
        .game-btn {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px;
            margin-bottom: 10px;
            text-align: left;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            transition: 0.3s;
            border-radius: 4px;
        }

        .game-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
            border-color: #fff;
        }

        .status { color: #00ff88; font-size: 0.7rem; }

        /* --- The Center Access Button --- */
        .access-container {
            grid-column: span 2;
            display: flex;
            justify-content: center;
        }

        .copy-btn {
            background: #fff;
            color: #000;
            padding: 20px 60px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.4s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .copy-btn:hover {
            background: #ff00ff;
            color: #fff;
            letter-spacing: 10px;
            transform: scale(1.05);
        }

        /* --- Mini Info Stats --- */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-box {
            background: rgba(255,255,255,0.02);
            padding: 10px;
            font-size: 0.7rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="main-ui">
        
        <div class="logo-section">
            <img src="Midas hub 2.png" class="logo-img" alt="MIDAS">
            <h1 style="font-family: 'Syncopate'; letter-spacing: 15px; margin-top: 10px; font-size: 1.2rem;">MIDAS HUB</h1>
        </div>

        <div class="rainbow-card">
            <div class="card-content">
                <h2>SYSTEM STATS</h2>
                <div class="stat-grid">
                    <div class="stat-box">Uptime: 99.9%</div>
                    <div class="stat-box">Users: 1.2k</div>
                    <div class="stat-box">Ping: 14ms</div>
                    <div class="stat-box">Ver: v0.2A</div>
                </div>
                <p style="font-size: 0.7rem; margin-top: 20px; color: #666;">
                    Encrypted tunnel established. All scripts bypass latest server-side checks.
                </p>
            </div>
        </div>

        <div class="rainbow-card">
            <div class="card-content">
                <h2>SUPPORTED GAMES</h2>
                <button class="game-btn">BURGERZ <span class="status">● STABLE</span></button>
                <button class="game-btn">DIVE!!! <span class="status">● ACTIVE</span></button>
                <button class="game-btn" style="opacity: 0.3;">MORE SOON...</button>
            </div>
        </div>

        <div class="access-container">
            <button class="copy-btn" onclick="copyToClipboard()">ACCESS HUB</button>
        </div>

    </div>

    <script>
        function copyToClipboard() {
            const script = 'loadstring(game:HttpGet("https://raw.githubusercontent.com/MidasHub/Main/main/loader.lua"))()';
            navigator.clipboard.writeText(script);
            alert("LOADSTRING COPIED! PASTE IN EXECUTOR.");
        }
    </script>
</body>
</html>
